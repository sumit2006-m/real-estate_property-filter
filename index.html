<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChronoHome Nagpur | GIS Pro</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(255, 255, 255, 0.4);
            --accent: #6366f1;
            --text-main: #1e293b;
            --card-bg: rgba(255, 255, 255, 0.9);
            --input-bg: rgba(255, 255, 255, 0.6);
        }

        [data-theme="dark"] {
            --glass: rgba(15, 23, 42, 0.85);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f1f5f9;
            --card-bg: rgba(30, 41, 59, 0.9);
            --input-bg: rgba(0, 0, 0, 0.3);
        }

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            background: #000;
        }

        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
            z-index: 1;
        }

        .sidebar {
            position: absolute;
            top: 20px;
            left: 20px;
            bottom: 20px;
            width: 340px;
            background: var(--glass);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            padding: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            color: var(--text-main);
            transition: background 0.3s, color 0.3s;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 1.4rem;
            margin: 0;
            font-weight: 800;
        }

        .header h1 span {
            color: var(--accent);
        }

        /* Search Bar */
        .search-box {
            position: relative;
            margin-bottom: 20px;
        }

        #addressSearch {
            width: 100%;
            padding: 12px 15px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: var(--input-bg);
            color: var(--text-main);
            outline: none;
            font-size: 0.9rem;
        }

        .suggestions-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            margin-top: 5px;
            z-index: 2000;
            max-height: 200px;
            overflow-y: auto;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .suggestion-item {
            padding: 10px 15px;
            cursor: pointer;
            font-size: 0.85rem;
            border-bottom: 1px solid var(--glass-border);
            transition: background 0.2s;
        }

        .suggestion-item:last-child {
            border-bottom: none;
        }

        .suggestion-item:hover {
            background: var(--accent);
            color: white;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 8px;
            opacity: 0.8;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .badge {
            background: var(--accent);
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
        }

        .results-scroll {
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
        }

        .prop-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 10px;
        }

        .price {
            color: var(--accent);
            font-weight: 800;
        }

        .toggle-btn {
            cursor: pointer;
            border: none;
            background: none;
            color: var(--text-main);
            padding: 5px;
        }

        /* Utility */
        .hidden {
            display: none;
        }
    </style>
</head>

<body data-theme="dark">

    <div id="map"></div>

    <aside class="sidebar">
        <div class="header">
            <h1>Chrono<span>Home</span></h1>
            <button class="toggle-btn" onclick="toggleTheme()" id="themeIconBtn">
                <i data-lucide="sun"></i>
            </button>
        </div>

        <div class="search-box">
            <input type="text" id="addressSearch" placeholder="Search Nagpur (e.g. Sitabuldi)..." autocomplete="off">
            <div id="suggestions" class="suggestions-dropdown hidden"></div>
        </div>

        <div class="control-group">
            <label>Max Commute Time</label>
            <input type="range" id="commuteSlider" min="5" max="60" value="25">
            <div style="display: flex; justify-content: space-between; margin-top: 8px;">
                <span id="timeVal" class="badge">25 mins</span>
                <span style="font-size: 0.75rem; font-weight: 600;">Found: <b id="count">0</b></span>
            </div>
        </div>

        <div id="resultsList" class="results-scroll"></div>
    </aside>

    <script>
        // 1. Setup & Data
        const props = [
            { id: 1, name: "Civil Lines Heights", price: "₹25,000", lat: 21.152, lng: 79.070 },
            { id: 2, name: "Dharampeth Residency", price: "₹18,500", lat: 21.140, lng: 79.065 },
            { id: 3, name: "Ramdaspeth Premium", price: "₹32,000", lat: 21.135, lng: 79.075 },
            { id: 4, name: "Sitabuldi Square Lofts", price: "₹15,000", lat: 21.145, lng: 79.085 },
            { id: 5, name: "Manish Nagar Studio", price: "₹12,000", lat: 21.095, lng: 79.090 },
            { id: 6, name: "Pratap Nagar Apts", price: "₹22,500", lat: 21.120, lng: 79.055 },
            { id: 7, name: "MIHAN Tech Park Stay", price: "₹20,000", lat: 21.060, lng: 79.050 },
            { id: 8, name: "Trimurti Nagar Flat", price: "₹16,000", lat: 21.115, lng: 79.045 }
        ];

        // 2. Initialize Map
        const map = L.map('map', { zoomControl: false }).setView([21.1458, 79.0882], 13);

        // Define Tile Layers
        const darkTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: 'CartoDB' });
        const lightTiles = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: 'OSM' });

        // Set default theme
        darkTiles.addTo(map);

        // 3. Markers
        const workplaceIcon = L.divIcon({
            className: 'workplace-marker',
            html: "<div style='background:#6366f1; width:14px; height:14px; border-radius:50%; border:3px solid white; box-shadow:0 0 10px #6366f1;'></div>",
            iconSize: [20, 20], iconAnchor: [10, 10]
        });

        const workplace = L.marker([21.1458, 79.0882], { icon: workplaceIcon, draggable: true }).addTo(map);
        const reachCircle = L.circle([21.1458, 79.0882], { color: '#6366f1', fillColor: '#6366f1', fillOpacity: 0.1, weight: 1.5, dashArray: '5, 5' }).addTo(map);
        const markersLayer = L.layerGroup().addTo(map);

        // 4. THEME SWITCHER FIX
        function toggleTheme() {
            const body = document.body;
            const currentTheme = body.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';

            body.setAttribute('data-theme', newTheme);

            // Swap Map Tiles
            if (newTheme === 'light') {
                map.removeLayer(darkTiles);
                lightTiles.addTo(map);
                document.getElementById('themeIconBtn').innerHTML = '<i data-lucide="moon"></i>';
            } else {
                map.removeLayer(lightTiles);
                darkTiles.addTo(map);
                document.getElementById('themeIconBtn').innerHTML = '<i data-lucide="sun"></i>';
            }
            lucide.createIcons();
        }

        // 5. SEARCH LOGIC FIX (Direct Fetch)
        const searchInput = document.getElementById('addressSearch');
        const suggestionsBox = document.getElementById('suggestions');
        let debounceTimer;

        // Handle typing in the search box
        searchInput.addEventListener('input', function () {
            clearTimeout(debounceTimer);
            const query = this.value;

            if (query.length < 3) {
                suggestionsBox.classList.add('hidden');
                return;
            }

            // Wait 300ms after user stops typing to call API
            debounceTimer = setTimeout(() => {
                fetch('https://nominatim.openstreetmap.org/search?format=json&q=${query}+Nagpur&limit=5')
                    .then(res => res.json())
                    .then(data => {
                        renderSuggestions(data);
                    });
            }, 300);
        });

        function renderSuggestions(data) {
            suggestionsBox.innerHTML = '';
            if (data.length === 0) {
                suggestionsBox.classList.add('hidden');
                return;
            }

            data.forEach(place => {
                const div = document.createElement('div');
                div.className = 'suggestion-item';
                // Clean up the address string (remove "Nagpur, Maharashtra, India" etc. for brevity)
                const shortName = place.display_name.split(',')[0] + (place.display_name.split(',')[1] ? ', ' + place.display_name.split(',')[1] : '');
                div.innerText = shortName;

                div.onclick = () => {
                    const latlng = [place.lat, place.lon];
                    workplace.setLatLng(latlng);
                    map.flyTo(latlng, 14);
                    searchInput.value = shortName;
                    suggestionsBox.classList.add('hidden');
                    updateUI();
                };
                suggestionsBox.appendChild(div);
            });

            suggestionsBox.classList.remove('hidden');
        }

        // Close suggestions when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-box')) {
                suggestionsBox.classList.add('hidden');
            }
        });

        // 6. UI Logic
        function updateUI() {
            const mins = document.getElementById('commuteSlider').value;
            document.getElementById('timeVal').innerText = '${mins} mins';
            const radius = mins * 220; // Approx speed

            reachCircle.setRadius(radius);
            reachCircle.setLatLng(workplace.getLatLng());
            markersLayer.clearLayers();

            const list = document.getElementById('resultsList');
            list.innerHTML = '';
            let count = 0;

            props.forEach(p => {
                const dist = workplace.getLatLng().distanceTo([p.lat, p.lng]);
                if (dist <= radius) {
                    count++;
                    const travelTime = Math.round(dist / 220);
                    L.circleMarker([p.lat, p.lng], { radius: 6, color: '#6366f1', fillColor: '#fff', fillOpacity: 1, weight: 2 }).addTo(markersLayer);

                    const card = document.createElement('div');
                    card.className = 'prop-card';
                    card.innerHTML = `<h4>${p.name}</h4><div style="display:flex; justify-content:space-between; align-items:center;">
                        <span class="price">${p.price}</span><small>🕒 ${travelTime} min</small></div>`;
                    list.appendChild(card);
                }
            });
            document.getElementById('count').innerText = count;
        }

        // Listeners
        document.getElementById('commuteSlider').addEventListener('input', updateUI);
        workplace.on('drag', updateUI);

        // Final Init
        lucide.createIcons();
        updateUI();
    </script>
</body>

</html>
