<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChronoHome Nagpur | GIS Pro</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

</head>

<body data-theme="dark">

    <div id="map"></div>

    <aside class="sidebar sidebar-left">
        <div class="header">
            <h1>Chrono<span>Home</span></h1>
            <button class="toggle-btn" onclick="toggleTheme()" id="themeIconBtn">
                <i data-lucide="sun"></i>
            </button>
        </div>

        <div class="search-box">
            <input type="text" id="addressSearch" placeholder="Search Nagpur (e.g. Besa)..." autocomplete="off">
            <span id="clearSearch" class="clear-btn"><i data-lucide="x" size="18"></i></span>
            <div id="suggestions" class="suggestions-dropdown hidden"></div>
        </div>

        <div class="control-group">
            <label>Travel Mode</label>
            <div class="mode-toggle">
                <button class="mode-btn active" onclick="setMode('driving', 400, '#6366f1')" id="btn-driving">
                    <i data-lucide="car" size="16"></i>
                </button>
                <button class="mode-btn" onclick="setMode('cycling', 250, '#10b981')" id="btn-cycling">
                    <i data-lucide="bike" size="16"></i>
                </button>
                <button class="mode-btn" onclick="setMode('walking', 80, '#f59e0b')" id="btn-walking">
                    <i data-lucide="footprints" size="16"></i>
                </button>
            </div>
        </div>

        <div class="control-group">
            <label>Max Commute Time</label>
            <input type="range" id="commuteSlider" min="5" max="60" value="25">
            <div style="display: flex; justify-content: space-between; margin-top: 8px;">
                <span id="timeVal" class="badge">25 mins</span>
                <span style="font-size: 0.75rem; font-weight: 600;">Found: <b id="count">0</b></span>
            </div>
        </div>


        <div id="resultsList" class="results-scroll"></div>
    </aside>

    <aside id="detailsSidebar" class="sidebar sidebar-right hidden">
        <div class="header">
            <h2 id="detName" style="font-size: 1.2rem; margin:0;">Property Details</h2>
            <button class="toggle-btn" onclick="closeDetails()"><i data-lucide="x"></i></button>
        </div>
        <div class="hero-img">
            <i data-lucide="home" size="48"></i>
        </div>
        <div class="info-grid">
            <div class="info-box">
                <label style="font-size: 0.6rem; text-transform: uppercase; opacity: 0.7;">Rent</label>
                <p id="detPrice" style="color: var(--accent);">₹0</p>
            </div>
            <div class="info-box">
                <label style="font-size: 0.6rem; text-transform: uppercase; opacity: 0.7;">Commute</label>
                <p id="detTime">0 mins</p>
            </div>
        </div>
        <div class="control-group">
            <label>Description</label>
            <p style="font-size: 0.85rem; line-height: 1.5; opacity: 0.8;">
                Premium gated community located in a prime area of Nagpur. Includes 24/7 security, power backup, and
                close proximity to the Metro.
            </p>
        </div>
        <div class="control-group">
            <label>Safety & Night Life</label>
            <div class="safety-meter">
                <div class="safety-bar-bg">
                    <div id="safetyFill" class="safety-fill" style="width: 0%"></div>
                </div>
                <span id="safetyLabel">Analyzing...</span>
            </div>
            <button class="secondary-btn" onclick="toggleSafetyZone()">
                <i data-lucide="shield-check" size="14"></i> Show Safety Radius
            </button>
        </div>
        <button class="book-btn">Schedule Visit</button>
    </aside>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="script.js"></script>
    </div>

    <div class="floating-poi-control">
        <div class="control-section">
            <div class="poi-title">Neighborhood Essentials</div>
            <div class="poi-grid">
                <label class="poi-item">
                    <input type="checkbox" onchange="togglePOI('hospital', this)">
                    <div class="poi-content">
                        <i data-lucide="hospital" size="14"></i>
                        <span>Hospitals</span>
                    </div>
                </label>
                <label class="poi-item">
                    <input type="checkbox" onchange="togglePOI('subway', this)">
                    <div class="poi-content">
                        <i data-lucide="train" size="14"></i>
                        <span>Metro</span>
                    </div>
                </label>
                <label class="poi-item">
                    <input type="checkbox" onchange="togglePOI('shopping_cart', this)">
                    <div class="poi-content">
                        <i data-lucide="shopping-cart" size="14"></i>
                        <span>Markets</span>
                    </div>
                </label>
            </div>
        </div>

        <div class="divider"></div>

        <div class="control-section">
            <div class="poi-title">Sunlight Exposure</div>
            <div class="sun-container">
                <div class="sun-row">
                    <i data-lucide="sun" size="16" class="sun-icon"></i>
                    <input type="range" id="sunSlider" min="6" max="18" value="12" oninput="updateSunlight()">
                    <span id="sunTimeText">12:00 PM</span>
                </div>
            </div>
        </div>
    </div>

    <div class="poi-title">Essentials</div>
    <div class="poi-grid">
        <label class="poi-item">
            <input type="checkbox" onchange="togglePOI('hospital', this)">
            <span><i data-lucide="hospital" size="14"></i> Hospitals</span>
        </label>
        <label class="poi-item">
            <input type="checkbox" onchange="togglePOI('subway', this)">
            <span><i data-lucide="train" size="14"></i> Metro</span>
        </label>
        <label class="poi-item">
            <input type="checkbox" onchange="togglePOI('shopping_cart', this)">
            <span><i data-lucide="shopping-cart" size="14"></i> Markets</span>
        </label>
    </div>
    </div>

</body>

</html>
